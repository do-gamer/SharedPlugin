do_gamer.simple_galaxy_gate.other.only_when_not_available.desc=Переключит, когда больше не будет доступных ресурсов для выполнения Galaxy Gate.
do_gamer.simple_galaxy_gate.other.stuck_in_gate_timer=Таймер застревания во вратах (минуты)
