do_gamer.simple_galaxy_gate.builder.switch_ship=Переключение корабля
do_gamer.simple_galaxy_gate.builder.switch_ship.desc=Доступно только для врат, которые можно построить.
do_gamer.simple_galaxy_gate.builder.switch_ship.ship_for_gate=Корабль для врат
do_gamer.simple_galaxy_gate.builder.switch_ship.ship_for_gate.desc=Корабль, на который нужно переключиться при полёте к вратам.
do_gamer.simple_galaxy_gate.builder.switch_ship.ship_for_build=Корабль для строительства
do_gamer.simple_galaxy_gate.builder.switch_ship.ship_for_build.desc=Корабль, на который нужно переключиться при строительстве врат.
do_gamer.simple_galaxy_gate.other=Прочие настройки
