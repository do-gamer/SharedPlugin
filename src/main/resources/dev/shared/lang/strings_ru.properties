do_gamer.simple_galaxy_gate.any_gate.desc=Настройки, которые будут использоваться для любых Galaxy Gate, если не выбраны конкретные врата.
do_gamer.simple_galaxy_gate.any_gate.npc_radius=Радиус NPC
