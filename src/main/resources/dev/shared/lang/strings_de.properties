do_gamer.simple_galaxy_gate.builder.spins_5.desc=Verwende x5-Spins, wenn die erhaltenen Teile unter x % liegen. Auf 0 % setzen, um zu deaktivieren.
do_gamer.simple_galaxy_gate.builder.spins_10=Bis dahin x10-Spins verwenden
do_gamer.simple_galaxy_gate.builder.spins_10.desc=Verwende x10-Spins, wenn die erhaltenen Teile unter x % liegen. Auf 0 % setzen, um zu deaktivieren.
do_gamer.simple_galaxy_gate.builder.spins_100=Bis dahin x100-Spins verwenden
do_gamer.simple_galaxy_gate.builder.spins_100.desc=Verwende x100-Spins, wenn die erhaltenen Teile unter x % liegen. Auf 0 % setzen, um zu deaktivieren.
do_gamer.simple_galaxy_gate.builder.speed=Builder-Geschwindigkeit
do_gamer.simple_galaxy_gate.builder.speed.desc=Geschwindigkeit des Gate-Baus. Bitte beachte, dass höhere Geschwindigkeiten zu Spiel-Lags führen können.
do_gamer.simple_galaxy_gate.builder.build_until=Bauen bis
do_gamer.simple_galaxy_gate.builder.build_until.desc=Beende den Bau, wenn das Gate auf der Map platziert ist (1 von 2), oder erst, wenn es abgeschlossen und für den nächsten Durchlauf bereit ist (2 von 2).
do_gamer.simple_galaxy_gate.builder.switch_ship=Schiffswechsel
do_gamer.simple_galaxy_gate.builder.switch_ship.desc=Nur für Gates verfügbar, die gebaut werden können.
do_gamer.simple_galaxy_gate.builder.switch_ship.ship_for_gate=Schiff für Gate
do_gamer.simple_galaxy_gate.builder.switch_ship.ship_for_gate.desc=Schiff, zu dem gewechselt werden soll, wenn du zum Gate gehst.
do_gamer.simple_galaxy_gate.builder.switch_ship.ship_for_build=Schiff für Bau
do_gamer.simple_galaxy_gate.builder.switch_ship.ship_for_build.desc=Schiff, zu dem gewechselt werden soll, wenn das Gate gebaut wird.
do_gamer.simple_galaxy_gate.other=Weitere Einstellungen
do_gamer.simple_galaxy_gate.other.stick_to_any_target=An jedem Ziel festhalten
do_gamer.simple_galaxy_gate.other.stick_to_any_target.desc=Wenn aktiviert, bleibt der Bot an jedem Ziel im Gate, unabhängig von den individuellen NPC-Flags.
do_gamer.simple_galaxy_gate.other.pet_collect=PET-Hilfe beim Sammeln
do_gamer.simple_galaxy_gate.other.pet_collect.desc=Aktiviert das Sammel-Gear des PET, wenn die ausgewählte Box-Bedingung erfüllt ist (benötigt Auto-looter gear).
do_gamer.simple_galaxy_gate.other.bot_profile=Bot-Profil nach dem Gate
do_gamer.simple_galaxy_gate.other.bot_profile.desc=Profil, zu dem nach Abschluss des Gates gewechselt wird.
do_gamer.simple_galaxy_gate.other.only_when_not_available=Nur wechseln, wenn nicht verfügbar
do_gamer.simple_galaxy_gate.other.only_when_not_available.desc=Wechselt, wenn keine Ressourcen mehr verfügbar sind, um das Galaxy Gate durchzuführen.
do_gamer.simple_galaxy_gate.other.stuck_in_gate_timer=Timeout bei Festhängen im Gate (Minuten)
do_gamer.simple_galaxy_gate.other.stuck_in_gate_timer.desc=Wenn du im GG festhängst, versuche zuerst neu zu laden. Wenn das nicht hilft, fliege in die Strahlung, um das Schiff zu zerstören. Auf 0 setzen, um zu deaktivieren.
