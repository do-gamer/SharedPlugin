do_gamer.simple_galaxy_gate.gate=Galaxy Gate
do_gamer.simple_galaxy_gate.any_gate=Allgemeine Gate-Einstellungen
do_gamer.simple_galaxy_gate.any_gate.desc=Einstellungen, die für jedes Galaxy Gate verwendet werden, wenn kein spezifisches ausgewählt ist.
do_gamer.simple_galaxy_gate.any_gate.npc_radius=NPC-Radius
do_gamer.simple_galaxy_gate.any_gate.npc_radius.desc=Überschreibt den Radius für den Angriff auf NPCs. Auf 0 setzen, um zu deaktivieren.
