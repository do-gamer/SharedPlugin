do_gamer.simple_galaxy_gate.kamikaze=Kamikaze-Einstellungen
do_gamer.simple_galaxy_gate.kamikaze.desc=Erfordert, dass das PET ein Kamikaze-Gear ausgerüstet hat, weniger als 20 % HP besitzt und dem NPC das Extra-Flag Kamikaze hinzugefügt wurde.
do_gamer.simple_galaxy_gate.kamikaze.min_npcs=Mindestanzahl an NPCs
do_gamer.simple_galaxy_gate.kamikaze.min_npcs.desc=Mindestanzahl an NPCs mit dem Extra-Flag Kamikaze, um es zu verwenden.
