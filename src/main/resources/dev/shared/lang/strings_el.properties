do_gamer.fix_pet_stuck.stuck_seconds.desc=Επαναφορτώνει το παιχνίδι όταν το PET είναι ενεργοποιημένο αλλά παραμένει ανενεργό κατά την επίθεση για το καθορισμένο χρονικό διάστημα.

