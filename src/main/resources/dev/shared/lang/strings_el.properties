do_gamer.solaris_inc.config.other.use_pet_kamikaze.desc=Προσπάθησε να χρησιμοποιήσεις και το PET Kamikaze όταν η ικανότητα του σκάφους είναι ενεργή (απαιτεί G-KK1).

