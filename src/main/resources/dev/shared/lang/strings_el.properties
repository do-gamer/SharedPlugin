do_gamer.spaceball.config.other.target_delay.desc=Το χρονικό διάστημα για συλλογή κουτιών μετά από γκολ. Επίσης για επαναστόχευση.
do_gamer.spaceball.config.other.bot_profile=Ορισμός διαμόρφωσης όταν τελειώσει
do_gamer.spaceball.config.other.bot_profile.desc=Αλλαγή στη καθορισμένη διαμόρφωση όταν τελειώσει το event. Βάλε "(none)" για απενεργοποίηση.

